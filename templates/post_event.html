<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post an Event</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/post_event.css') }}">
</head>
<body>
    <header>
        <h1>Post an Event</h1>
    </header>

    <div class="form-container">
        <form action="{{ url_for('post_event') }}" method="POST">
            <label for="name">Event Name</label>
            <input type="text" id="name" name="name" required>

            <label for="address">Address</label>
            <input type="text" id="address" name="address" required>

            <label for="max_participants">Max Participants</label>
            <input type="number" id="max_participants" name="max_participants" required>

            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Time</label>
            <input type="time" id="time" name="time" required>

            <label for="team_members">Team Members</label>
            <input type="text" id="team_members" name="team_members">

            <label for="college">College Name</label>
            <input type="text" id="college" name="college" required>

            <button type="submit">Post Event</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2025 Horizon. All rights reserved.</p>
    </footer>
</body>
</html>
