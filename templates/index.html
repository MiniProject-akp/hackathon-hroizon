<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Events</title>
</head>
<body>
    <h1>Horizon</h1>
    <a href="{{ url_for('post_event') }}">Post an Event</a>
    <ul>
        {% for event in events %}
            <li>
                <a href="{{ url_for('event_detail', event_id=event.id) }}">{{ event.name }}</a>
                <a href="{{ url_for('register', event_id=event.id) }}">Register</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
